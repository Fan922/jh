<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极地航行</title>
    <style>
        /* 清除默认边距，让网页铺满全屏 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 隐藏滚动条 */
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            cursor: pointer; /* 鼠标变成点击手势 */
            user-select: none; /* 防止文字被选中 */
        }

        /* 背景图片层 */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.jpg'); /* 这里读取你的背景图片 */
            background-size: cover; /* 保证图片铺满屏幕 */
            background-position: center;
            z-index: 1;
        }

        /* 蓝色透明叠加层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 蓝色 (HotPink)，40% (0.4) 透明度 */
            background-color: rgba(140, 230, 227, 0.4); 
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 居中文字样式 */
        .center-text {
            color: white;
            font-size: 6rem;
            font-weight: bold;
            letter-spacing: 10px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); /* 添加一点阴影让文字更清晰 */
            z-index: 3;
            pointer-events: none; /* 让点击事件穿透文字，点在文字上也能触发特效 */
        }

        /* emoji 动画基础样式 */
        .emoji {
            position: absolute;
            font-size: 2.5rem;
            pointer-events: none;
            z-index: 4;
            transform: translate(-50%, -50%); /* 以点击位置为中心 */
            animation: scatter 1s ease-out forwards; /* 播放散落动画 */
        }

        /* 定义 emoji 散落和消失的动画 */
        @keyframes scatter {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }
            100% {
                /* var(--dx) 和 var(--dy) 由 JS 随机生成，决定飞向哪里 */
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="overlay">
        <div class="center-text">朱苏</div>
    </div>

    <script>
        // 定义要出现的 emoji
        const emojis = ['🐵', '🐷'];

        // 监听整个网页的点击事件
        document.body.addEventListener('click', function(e) {
            // 每次点击生成 6 个 emoji
            for (let i = 0; i < 6; i++) {
                createEmoji(e.clientX, e.clientY);
            }
        });

        // 监听移动端触摸事件（支持手机屏幕点击）
        document.body.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            for (let i = 0; i < 6; i++) {
                createEmoji(touch.clientX, touch.clientY);
            }
        });

        function createEmoji(x, y) {
            const el = document.createElement('div');
            el.className = 'emoji';
            
            // 随机选择一个 emoji
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            
            // 设置初始位置在点击/触摸的地方
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            
            // 随机计算散开的距离和方向（角度）
            const angle = Math.random() * Math.PI * 2; // 0 到 360 度随机
            const distance = 80 + Math.random() * 120; // 散开的距离：80px 到 200px 随机
            
            // 将计算好的距离传给 CSS 动画
            el.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
            el.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
            
            // 将 emoji 添加到网页中
            document.body.appendChild(el);
            
            // 动画播放完毕后（1秒 = 1000毫秒），将元素从网页中删除以节省内存
            setTimeout(() => {
                el.remove();
            }, 1000);
        }
    </script>

</body>
</html>
